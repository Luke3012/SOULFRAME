<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{{ PRODUCT_NAME }}}</title>
    <meta name="description" content="Unity plugin to turn people into realistic 3D avatars">
    <link rel="stylesheet" href="TemplateData/style.css">
	<link rel="stylesheet" href="TemplateData/Avaturn/AvaturnStyle.css"><!-- Required for Avaturn Web Creator -->
    <link rel="icon" type="image/png" sizes="32x32" href="TemplateData/SOULFRAME_Icon.png?v=1" />
    <link rel="shortcut icon" type="image/png" href="TemplateData/SOULFRAME_Icon.png?v=1" />
</head>

<body>
    <div id="canvas-wrap">
		<!-- avaturn-container div and contents required for Avaturn Web Creator -->
        <div id="avaturn-container">
			<div id="avaturn-sdk-container" class="avaturn-sdk-container"></div>
        </div>
		<!-- avaturn-container div and contents required for Avaturn Web Creator -->
        <div id="soulframe-loading-overlay" aria-live="polite">
            <div class="soulframe-loading-content">
                <img
                    id="soulframe-loading-logo"
                    src="TemplateData/SOULFRAME_Icon.png"
                    alt="SOULFRAME"
                >
                <div id="soulframe-loading-text">Caricamento scena in corso<span class="soulframe-loading-dots"><span>.</span><span>.</span><span>.</span></span></div>
                <div id="soulframe-loading-bar" aria-hidden="true">
                    <div id="soulframe-loading-bar-fill"></div>
                </div>
                <div id="soulframe-loading-progress">Inizializzazione 0%</div>
            </div>
        </div>
        <div id="unity-container">
            <canvas id="unity-canvas" ></canvas>
        </div>
    </div>
</body>

<script src="TemplateData/Global.js"></script>
<script src="TemplateData/Avaturn/AvaturnFrame.js" type="module"></script><!-- Required for Avaturn Web Creator -->
<script src="Build/{{{ LOADER_FILENAME }}}"></script>
<script src="TemplateData/UnitySetup.js"></script>

</html>
